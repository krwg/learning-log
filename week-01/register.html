<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Create Your Account</title>
    <meta name="description" content="Create your account to access exclusive content and features.">
    <meta property="og:title" content="Register - Create Your Account">
    <meta property="og:description" content="Create your account to access exclusive content and features.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://avatars.githubusercontent.com/krwg?size=200">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>
<body>
    <a href="#main-content">Skip to main content</a>

    <header>
        <h1>My Portfolio</h1>
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About me</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="register.html" aria-current="page">Register</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section id="Registration" aria-labelledby="register-heading">
            <h2 id="register-heading">Register</h2>

            <form action="#" method="post" onsubmit="return false;">
                <fieldset>
                    <legend>Personal Information</legend>

                    <p>
                        <label for="fullname">Full Name</label><br>
                        <input type="text" id="fullname" name="fullname" required placeholder="John Doe" autocomplete="name">
                    </p>

                    <p>
                        <label for="reg-email">Email</label><br>
                        <input type="email" id="reg-email" name="email" required placeholder="you@example.com" autocomplete="email">
                    </p>

                    <p>
                        <label for="city">City</label><br>
                        <input type="text" id="city" name="city" list="cities" placeholder="Start typing or choose" autocomplete="address-level2">
                        <datalist id="cities">
                            <option value="New York">
                            <option value="London">
                            <option value="Tokyo">
                            <option value="Berlin">
                            <option value="Sydney">
                        </datalist>
                    </p>
                </fieldset>

                <fieldset>
                    <legend>Account Credentials</legend>

                    <p>
                        <label for="username">Username</label><br>
                        <input type="text" id="username" name="username" required pattern="[A-Za-z0-9_]{3,20}" title="3-20 characters: letters, numbers, or underscore" placeholder="john_doe123" autocomplete="username">
                    </p>

                    <p>
                        <label for="password">Password</label><br>
                        <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password">
                    </p>
                </fieldset>

                <p>
                    <button type="submit">Create Account</button>
                    <button type="reset">Clear Form</button>
                </p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>
</body>
</html>
