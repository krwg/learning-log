<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About me</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="register.html" aria-current="page">Register</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="Registration" aria-labelledby="register-heading">
            <h2 id="register-heading">Register</h2>
            <p>Create your account. All fields are validated by the browser before submission.</p>

            <form action="#" method="post" onsubmit="return false;">
                <fieldset>
                    <legend>Personal Information</legend>

                    <p>
                        <label for="fullname">Full Name</label><br>
                        <input type="text" id="fullname" name="fullname" required 
                               placeholder="John Doe" autocomplete="name">
                    </p>

                    <p>
                        <label for="reg-email">Email</label><br>
                        <input type="email" id="reg-email" name="email" required 
                               placeholder="you@example.com" autocomplete="email">
                    </p>

                    <p>
                        <label for="city">City</label><br>
                        <input type="text" id="city" name="city" list="cities" 
                               placeholder="Start typing or choose from list" autocomplete="address-level2">
                        <datalist id="cities">
                            <option value="New York">
                            <option value="London">
                            <option value="Tokyo">
                            <option value="Berlin">
                            <option value="Sydney">
                            <option value="Toronto">
                        </datalist>
                    </p>
                </fieldset>

                <fieldset>
                    <legend>Account Credentials</legend>

                    <p>
                        <label for="username">Username</label><br>
                        <input type="text" id="username" name="username" required 
                               pattern="[A-Za-z0-9_]{3,20}" 
                               title="Username must be 3-20 characters: letters, numbers, or underscore"
                               placeholder="john_doe123"
                               autocomplete="username">
                    </p>

                    <p>
                        <label for="password">Password</label><br>
                        <input type="password" id="password" name="password" required 
                               minlength="8" 
                               placeholder="At least 8 characters"
                               autocomplete="new-password">
                    </p>

                    <p>
                        <label for="confirm-password">Confirm Password</label><br>
                        <input type="password" id="confirm-password" name="confirm-password" required 
                               minlength="8" 
                               placeholder="Re-enter your password"
                               autocomplete="new-password">
                    </p>
                </fieldset>

                <p>
                    <button type="submit">Create Account</button>
                    <button type="reset">Clear Form</button>
                </p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Website - Register</p>
    </footer>
</body>
</html>
