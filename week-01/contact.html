<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About me</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="ContactForm" aria-labelledby="contact-heading">
            <h2 id="contact-heading">Contact Me</h2>
            <p>Fill out the form below. On a static site you can inspect the payload in DevTools → Network after submit.</p>

            <form action="#" method="post" onsubmit="return false;">
                <p>
                    <label for="name">Name</label><br>
                    <input type="text" id="name" name="name" required autocomplete="name">
                </p>

                <p>
                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </p>

                <p>
                    <label for="topic">Topic</label><br>
                    <select id="topic" name="topic" required>
                        <option value="">-- Choose a topic --</option>
                        <option value="general">General question</option>
                        <option value="collaboration">Collaboration</option>
                        <option value="feedback">Feedback</option>
                        <option value="other">Other</option>
                    </select>
                </p>

                <p>
                    <label for="message">Message</label><br>
                    <textarea id="message" name="message" rows="5" cols="40" required></textarea>
                </p>

                <fieldset>
                    <legend>Preferred contact method</legend>
                    <p>
                        <input type="radio" id="contact-email" name="contact-method" value="email" required>
                        <label for="contact-email">Email</label>
                    </p>
                    <p>
                        <input type="radio" id="contact-phone" name="contact-method" value="phone">
                        <label for="contact-phone">Phone</label>
                    </p>
                    <p>
                        <input type="radio" id="contact-telegram" name="contact-method" value="telegram">
                        <label for="contact-telegram">Telegram</label>
                    </p>
                </fieldset>

                <p>
                    <input type="checkbox" id="consent" name="consent" value="yes" required>
                    <label for="consent">I agree to the processing of my personal data</label>
                </p>

                <p>
                    <button type="submit">Send message</button>
                    <button type="reset">Reset</button>
                </p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Website - Contact</p>
    </footer>
</body>
</html>
